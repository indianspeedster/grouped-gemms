<svg xmlns="http://www.w3.org/2000/svg" width="998" height="438" viewBox="16.0 -4.0 998.0 438.0" font-family="Segoe UI, Helvetica, Arial, sans-serif">
<rect x="16.0" y="-4.0" width="998.0" height="438.0" fill="#ffffff"/>
<text x="40.0" y="43.0" font-size="28" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#c41e3a" text-anchor="start">Inside the inner loop — dot_scaled + EVEN_K peel</text>
<text x="40.0" y="71.5" font-size="14" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#868e96" text-anchor="start">Scales ride into the MFMA (no dequant pass); the ragged K tail is peeled so the main loop is branch-free.</text>
<text x="60.0" y="117.3" font-size="15" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">Main loop · full BLOCK_K tiles</text>
<rect x="60.0" y="130.0" width="540.0" height="200.0" rx="12" fill="#f8f9fa" stroke="#1971c2" stroke-width="2"/>
<rect x="80.0" y="152.0" width="150.0" height="40.0" rx="12" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
<text x="155.0" y="174.5" font-size="13" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">load X tile</text>
<rect x="80.0" y="208.0" width="150.0" height="40.0" rx="12" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
<text x="155.0" y="230.5" font-size="13" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">load W tile</text>
<rect x="250.0" y="152.0" width="160.0" height="40.0" rx="12" fill="#ffec99" stroke="#1e1e1e" stroke-width="2"/>
<text x="330.0" y="174.3" font-size="12" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">load X/W scales</text>
<rect x="250.0" y="208.0" width="160.0" height="96.0" rx="12" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
<text x="330.0" y="242.3" font-size="13" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">tl.dot_scaled</text>
<text x="330.0" y="258.5" font-size="13" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">e4m3 × e4m3</text>
<text x="330.0" y="274.8" font-size="13" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">acc += , fast_math</text>
<rect x="430.0" y="152.0" width="150.0" height="40.0" rx="12" fill="#e9ecef" stroke="#1e1e1e" stroke-width="2"/>
<text x="505.0" y="166.8" font-size="12" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">advance ptrs</text>
<text x="505.0" y="181.8" font-size="12" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">+= BLOCK_K</text>
<polyline points="330.0,330.0 330.0,356.0 80.0,356.0 80.0,138.0" fill="none" stroke="#1971c2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,6"/>
<line x1="80.0" y1="138.0" x2="74.8" y2="147.7" stroke="#1971c2" stroke-width="2" stroke-linecap="round"/>
<line x1="80.0" y1="138.0" x2="85.2" y2="147.7" stroke="#1971c2" stroke-width="2" stroke-linecap="round"/>
<text x="660.0" y="117.3" font-size="15" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#e8590c" text-anchor="start">EVEN_K peel</text>
<rect x="660.0" y="130.0" width="330.0" height="64.0" rx="12" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
<text x="825.0" y="156.4" font-size="13" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">K % BLOCK_K == 0 → main loop runs</text>
<text x="825.0" y="172.7" font-size="13" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">all iters, no per-iter K-mask</text>
<rect x="660.0" y="206.0" width="330.0" height="80.0" rx="12" fill="#ffd8a8" stroke="#1e1e1e" stroke-width="2"/>
<text x="825.0" y="232.3" font-size="13" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">else → run num_k_iter−1 unmasked,</text>
<text x="825.0" y="248.5" font-size="13" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">then ONE masked tail iteration</text>
<text x="825.0" y="264.8" font-size="13" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">(offs_k &lt; MASK_K_LIMIT)</text>
<rect x="60.0" y="360.0" width="930.0" height="50.0" rx="12" fill="#e9ecef" stroke="#1e1e1e" stroke-width="2"/>
<text x="525.0" y="387.7" font-size="14" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">acc = tl.dot_scaled(x, x_scales, "e4m3", w, w_scales, "e4m3", acc=acc, fast_math=True)</text>
</svg>