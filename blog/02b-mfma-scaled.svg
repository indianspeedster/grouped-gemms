<text x="40.0" y="71.5" font-size="14" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#868e96" text-anchor="start">v_mfma_scale_f32_16x16x128_f8f6f4:  C[16×16] += A[16×128] · B[128×16], applying one e8m0 scale per 32-wide K-block natively — no separate dequant pass.</text>
