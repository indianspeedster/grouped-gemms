<text x="60.0" y="431.5" font-size="14" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Per output element, summed over the 4 K-blocks  b = 0..3:</text>
<rect x="60.0" y="450.0" width="980.0" height="44.0" rx="12" fill="#e9ecef" stroke="#1e1e1e" stroke-width="2"/>
<text x="550.0" y="474.9" font-size="15" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">C[i,j]  +=  Σ_b   scale_A[i,b] · scale_B[j,b]  ·  Σ_(k in block b)  A[i,k] · B[k,j]</text>
<text x="60.0" y="518.7" font-size="13" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#868e96" text-anchor="start">The e8m0 scale is a power of two, so the engine folds it in as an exponent bias on the partial sum — exact and free.</text>
<text x="60.0" y="540.7" font-size="13" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#868e96" text-anchor="start">The 32-element block is why K-tiles must be multiples of 32, and why the scale operand's register layout (L4) matters.</text>
