<text x="545.0" y="422.4" font-size="13" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="middle">Measured: large square (1·8192·8192) 1022→1189 TF (+16%); but small (8·2048·2048) 946→753 TF (−20%).</text>
<text x="545.0" y="438.7" font-size="13" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="middle">A single fixed tile can't be right for every shape — this is exactly what L5 (per-shape autotune) fixes.</text>
