<rect x="800.0" y="150.0" width="180.0" height="70.0" rx="12" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="1.5"/>
<text x="890.0" y="187.1" font-size="11" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="middle">E0 @ B0^T</text>
<rect x="800.0" y="226.0" width="180.0" height="40.0" rx="12" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="1.5"/>
<text x="890.0" y="248.1" font-size="11" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="middle">E1 @ B1^T</text>
<rect x="800.0" y="272.0" width="180.0" height="95.0" rx="12" fill="#ffec99" stroke="#1e1e1e" stroke-width="1.5"/>
<text x="890.0" y="321.6" font-size="11" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="middle">E2 @ B2^T</text>
<rect x="800.0" y="373.0" width="180.0" height="35.0" rx="12" fill="#ffd8a8" stroke="#1e1e1e" stroke-width="1.5"/>
<text x="890.0" y="392.6" font-size="11" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="middle">E3 @ B3^T</text>
<text x="70.0" y="455.5" font-size="14" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#868e96" text-anchor="start">Row-counts per expert are known only at runtime (passed as group_end_offsets). Before any math the</text>
<text x="70.0" y="477.5" font-size="14" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#868e96" text-anchor="start">kernel must decide, per output tile, which expert owns it — cheap routing is the first half of the battle.</text>
