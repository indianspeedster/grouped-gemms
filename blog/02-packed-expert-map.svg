<text x="60.0" y="439.0" font-size="14" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#868e96" text-anchor="start">binary search, no per-tile expert scan inside the hot loop.</text>
<rect x="60.0" y="480.0" width="900.0" height="60.0" rx="12" fill="#e9ecef" stroke="#1e1e1e" stroke-width="2"/>
<text x="510.0" y="503.6" font-size="15" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">expt_data = tl.load(ExptData + pid_m);  if expt_data == -1: return</text>
<text x="510.0" y="522.3" font-size="15" font-family="Consolas, 'Courier New', monospace" fill="#1e1e1e" text-anchor="middle">expt_id = expt_data &amp; 0xFFFF;  block_id = expt_data &gt;&gt; 16</text>
