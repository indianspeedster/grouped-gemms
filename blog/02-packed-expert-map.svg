<text x="40.0" y="43.0" font-size="28" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#c41e3a" text-anchor="start">Optimization 2 — Packed expert→tile routing (one int32 per tile)</text>
<text x="40.0" y="71.5" font-size="14" font-family="Segoe UI, Helvetica, Arial, sans-serif" fill="#868e96" text-anchor="start">Each program reads one int32, decodes its expert + block, or skips a -1 pad tile.</text>
